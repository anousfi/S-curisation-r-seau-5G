logger:
  file:
    path: /var/log/open5gs/bsf.log

global:

bsf:
  # sbi:
  #   server:
  #     - address: bsf.localdomain #.open5gs.org
  #       port: 80
  #   client:
  #     nrf:
  #       - uri: http://nrf.localdomain:80 #.open5gs.org:80

################################################################################
# HTTPS scheme with TLS
################################################################################
#  o Set as default if not individually set
  default:
    tls:
      server:
        scheme: https
        private_key: /etc/open5gs/tls/bsf.key
        cert: /etc/open5gs/tls/bsf.crt
      client:
        scheme: https
        cacert: /etc/open5gs/tls/ca.crt
  sbi:
    server:
      - address: bsf.localdomain #.open5gs.org
    client:
      nrf:
        - uri: https://nrf.localdomain #.open5gs.org
