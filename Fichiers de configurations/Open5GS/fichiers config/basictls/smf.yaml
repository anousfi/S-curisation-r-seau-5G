logger:
  file:
    path: /var/log/open5gs/smf.log

global:

smf:
  # sbi:
  #   server:
  #     - address: smf.localdomain #.open5gs.org
  #       port: 80
  #   client:
  #     nrf:
  #       - uri: http://nrf.localdomain:80 #.open5gs.org:80
  pfcp:
    server:
      - address: smf.localdomain #.open5gs.org
    client:
      upf:
        - address: upf.localdomain #.open5gs.org
  gtpu:
    server:
      - address: smf.localdomain #.open5gs.org
  session:
    - subnet: 10.45.0.0/16
      gateway: 10.45.0.1
  dns:
    - 8.8.8.8
    - 8.8.4.4
  mtu: 1400

################################################################################
# HTTPS scheme with TLS
################################################################################
#  o Set as default if not individually set
  default:
   tls:
     server:
       scheme: https
       private_key: /etc/open5gs/tls/smf.key
       cert: /etc/open5gs/tls/smf.crt
     client:
       scheme: https
       cacert: /etc/open5gs/tls/ca.crt
  sbi:
   server:
     - address: smf.localdomain #.open5gs.org
   client:
     nrf:
       - uri: https://nrf.localdomain #.open5gs.org
#
#  o Enable SSL key logging for Wireshark
