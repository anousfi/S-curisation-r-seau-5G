################################################################################
# HTTPS scheme with TLS
################################################################################
#  o Set as default if not individually set
#  default:
#    tls:
#      server:
#        scheme: https
#        private_key: /etc/open5gs/tls/ausf.key
#        cert: /etc/open5gs/tls/ausf.crt
#      client:
#        scheme: https
#        cacert: /etc/open5gs/tls/ca.crt
#  sbi:
#    server:
#      - address: ausf.localdomain #.open5gs.org
#    client:
#      nrf:
#        - uri: https://nrf.localdomain #.open5gs.org
#
#  o Enable SSL key logging for Wireshark
#    - This configuration allows capturing SSL/TLS session keys
#      for debugging or analysis purposes using Wireshark.
  default:
    tls:
      server:
        scheme: https
        private_key: /etc/open5gs/tls/ausf.key
        cert: /etc/open5gs/tls/ausf.crt
        sslkeylogfile: /var/log/open5gs/tls/ausf-server-sslkeylog.log
      client:
        scheme: https
        cacert: /etc/open5gs/tls/ca.crt
        client_sslkeylogfile: /var/log/open5gs/tls/ausf-client-sslkeylog.log
  sbi:
    server:
      - address: ausf.localdomain #.open5gs.org
    client:
      nrf:
        - uri: https://nrf.localdomain #.open5gs.org
