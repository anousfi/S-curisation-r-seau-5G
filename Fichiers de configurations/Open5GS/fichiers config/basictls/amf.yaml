logger:
  file:
    path: /var/log/open5gs/amf.log

global:


amf:
#   sbi:
#     server:
#       - address: amf.open5gs.org
#         port: 80
#     client:
#       nrf:
#         - uri: http://nrf.open5gs.org:80
  ngap:
    server:
      - address: amf.localdomain #.open5gs.org
  guami:
    - plmn_id:
        mcc: 001
        mnc: 01
      amf_id:
        region: 2
        set: 1
  tai:
    - plmn_id:
        mcc: 001
        mnc: 01
      tac: 1
  plmn_support:
    - plmn_id:
        mcc: 001
        mnc: 01
      s_nssai:
        - sst: 1
        #  sd: 1
  security:
      integrity_order : [ NIA2, NIA1, NIA0 ]
      ciphering_order : [ NEA0, NEA1, NEA2 ]
  network_name:
    full: Open5GS
  amf_name: open5gs-amf0
  time:
    t3512:
      value: 540

################################################################################
# HTTPS scheme with TLS
################################################################################
#  o Set as default if not individually set
  # default:
  #   tls:
  #     server:
  #       scheme: https
  #       private_key: /etc/open5gs/tls/amf.key
  #       cert: /etc/open5gs/tls/amf.crt
  #     client:
  #       scheme: https
  #       cacert: /etc/open5gs/tls/ca.crt
  # sbi:
  #   server:
  #     - address: amf.localdomain #.open5gs.org
  #   client:
  #     nrf:
  #       - uri: https://nrf.localdomain #.open5gs.org
#
#  o Enable SSL key logging for Wireshark
#    - This configuration allows capturing SSL/TLS session keys
#      for debugging or analysis purposes using Wireshark.
  default:
    tls:
      server:
        scheme: https
        private_key: /etc/open5gs/tls/amf.key
        cert: /etc/open5gs/tls/amf.crt
        sslkeylogfile: /var/log/open5gs/tls/amf-server-sslkeylog.log
      client:
        scheme: https
        cacert: /etc/open5gs/tls/ca.crt
        client_sslkeylogfile: /var/log/open5gs/tls/amf-client-sslkeylog.log
  sbi:
    server:
      - address: amf.localdomain #.open5gs.org
    client:
      nrf:
        - uri: https://nrf.localdomain #.open5gs.org